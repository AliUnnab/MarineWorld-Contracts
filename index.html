            document.documentElement.classList.add("contrast-boost-amoled");
          }

        // Active protection against right-click, copy & dragging - active ONLY on landing pages
        document.addEventListener('contextmenu', function(e) {
          if (document.documentElement.classList.contains('landing-protection-active')) {
            e.preventDefault();
          }
        }, false);
        
        document.addEventListener('copy', function(e) {
          if (document.documentElement.classList.contains('landing-protection-active')) {
            e.preventDefault();
          }
        }, false);

        document.addEventListener('dragstart', function(e) {
          if (document.documentElement.classList.contains('landing-protection-active')) {
            e.preventDefault();
          }
        }, false);
      })();
